<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Science Bowl — Coach</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Science Bowl — Coach</h1>
  <span class="meta" id="hdr-week"></span>
  <span class="spacer"></span>
  <a href="analytics.html" class="btn small">Analytics</a>
  <a href="meetings.html" class="btn small">Meetings →</a>
  <button class="small" id="btn-refresh">Refresh</button>
  <button class="small" onclick="signOut()">Logout</button>
</header>

<div class="page">

  <div id="neglect-alerts" class="mt32"></div>

  <!-- ── TEAM OVERVIEW ─────────────────────────────── -->
  <div class="section mt32">
    <div class="section-header">
      <h2>Team — This Week</h2>
      <span class="muted" style="font-size:10px">click row to expand</span>
    </div>
    <div class="section-body" style="padding-bottom:0">
      <div class="table-wrap">
        <table>
          <thead id="team-thead"></thead>
          <tbody id="team-tbody">
            <tr><td colspan="11" class="muted" style="padding:20px 0">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── LEADERBOARD ────────────────────────────────── -->
  <div class="section">
    <div class="section-header"><h2>Leaderboard — This Week</h2></div>
    <div class="section-body" style="padding-bottom:0">
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Specialty</th><th>Min</th><th>Goal</th></tr></thead>
          <tbody id="lb-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── STUDENT CONFIG ─────────────────────────────── -->
  <div class="section">
    <div class="section-header"><h2>Student Configuration</h2></div>
    <div class="section-body">
      <div class="form-grid" style="max-width:700px;align-items:end">
        <div class="field" style="grid-column:1/-1">
          <label>Student</label>
          <select id="goal-student"><option value="">— select —</option></select>
        </div>

        <div class="field" style="grid-column:1/-1">
          <label>Specialties</label>
          <div id="specialty-checkboxes" style="display:flex;gap:16px;flex-wrap:wrap;padding-top:8px">
            <!-- rendered by JS -->
          </div>
        </div>

        <div class="field">
          <label>Min daily (min)</label>
          <input type="number" id="goal-daily-input" value="90" min="0" />
        </div>
        <div class="field">
          <label>Min weekly (min)</label>
          <input type="number" id="goal-weekly-input" value="630" min="0" />
        </div>
        <div class="field">
          <button class="primary" id="btn-save-goal">Save</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  const ws = weekStart();
  const we = new Date(ws.getTime() + 6*86400000);
  document.getElementById('hdr-week').textContent =
    `Week of ${ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${we.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;

  // Build specialty checkboxes
  document.getElementById('specialty-checkboxes').innerHTML = SUBJECTS.map(s => `
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--muted)">
      <input type="checkbox" value="${s.key}" id="spec-${s.key}" style="width:auto;border:none;border-bottom:none" />
      ${s.label}
    </label>`).join('');
</script>
<script src="js/coach.js"></script>
</body>
</html>
