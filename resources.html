<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Science Bowl — Resources</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Science Bowl</h1>
  <span class="meta">Resources</span>
  <span class="spacer"></span>
  <a href="dashboard.html" class="btn small">← Dashboard</a>
  <button class="small" onclick="signOut()">Logout</button>
</header>

<div class="page">

  <div class="mt32">
    <div class="tab-row" id="subject-tabs">
      <button class="tab-btn active" onclick="filterTab('all', this)">All</button>
      <button class="tab-btn" onclick="filterTab('bio', this)">Biology</button>
      <button class="tab-btn" onclick="filterTab('chem', this)">Chemistry</button>
      <button class="tab-btn" onclick="filterTab('physics', this)">Physics</button>
      <button class="tab-btn" onclick="filterTab('earth_space', this)">Earth &amp; Space</button>
      <button class="tab-btn" onclick="filterTab('math', this)">Math</button>
    </div>

    <div class="resource-grid" id="resource-grid">
      <p class="muted" style="font-size:12px;padding:16px 0">Loading…</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let allResources = [];
let activeFilter = 'all';

const LEVEL_CLASS = { 'Intermediate': 'level-mid', 'Advanced': 'level-adv' };

function renderResources(filter) {
  const grid = document.getElementById('resource-grid');
  const items = filter === 'all'
    ? allResources
    : allResources.filter(r => r.subjects.includes(filter));

  if (!items.length) {
    grid.innerHTML = '<p class="muted" style="font-size:12px;padding:16px 0">No resources for this filter.</p>';
    return;
  }

  const seen = new Set();
  const deduped = items.filter(r => {
    if (seen.has(r.title)) return false;
    seen.add(r.title);
    return true;
  });

  grid.innerHTML = deduped.map(r => {
    const levelBadge = r.level && r.level !== 'All'
      ? `<span class="rc-level ${LEVEL_CLASS[r.level] || ''}">${r.level}</span>`
      : '';
    const subjectTags = r.subjects
      .map(s => `<span class="rc-tag">${s === 'earth_space' ? 'Earth/Space' : s.charAt(0).toUpperCase() + s.slice(1)}</span>`)
      .join('');
    return `
    <div class="resource-card">
      <div class="rc-meta">
        <div class="rc-type">${r.type}</div>
        ${levelBadge}
      </div>
      ${subjectTags}
      <h3>${r.title}</h3>
      <p>${r.description}</p>
      <a href="${r.url}" target="_blank" rel="noopener" class="rc-link">${r.label}</a>
    </div>`;
  }).join('');
}

function filterTab(key, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = key;
  renderResources(key);
}

(async () => {
  const auth = await requireAuth('student');
  if (!auth) return;

  const { data, error } = await sb
    .from('resources')
    .select('subjects, type, level, title, description, url, label')
    .order('sort_order');

  if (error) {
    document.getElementById('resource-grid').innerHTML =
      '<p class="muted" style="font-size:12px;padding:16px 0">Failed to load resources.</p>';
    console.error(error);
    return;
  }

  allResources = data || [];
  renderResources(activeFilter);
})();
</script>
</body>
</html>
